  - Git
  - Source Control
  - DevOps
  - CI/CD
  - Code Hosting
  - Open Source
  - Self Hosted
  - FinOps
  - Cost Management
  - FOCUS
description: >-
  FinOps framework definition for the Gitea API surface. Provides a
  FOCUS-aligned mapping for cost allocation, usage measurement, and
  unit-economics reporting across the Gitea Enterprise per-user
  subscription and the Gitea Cloud single-tenant managed offering.
  The pure open-source Gitea distribution carries no software cost;
  FinOps reporting on OSS deployments is limited to underlying
  infrastructure (compute, storage, network) and operational labour.
principles:
  - name: Visibility
    description: >-
      Make Gitea Enterprise license costs and Gitea Cloud subscription
      costs visible to engineering, platform, and finance teams in
      near real-time, including add-on charges (Object Storage) and
      outbound network traffic.
  - name: Allocation
    description: >-
      Tag every chargeable Gitea resource (Cloud instance, Enterprise
      seat, Object Storage add-on, runner consumption) with the
      consuming team, environment, application, and cost centre so
      cost can be allocated.
  - name: Optimization
    description: >-
      Continuously evaluate user counts, Cloud tier selection,
      retention policies on packages and artifacts, and Actions
      runner utilization to reduce cost per useful unit of work.
  - name: Accountability
    description: >-
      Establish budget owners for the Gitea instance, Actions usage,
      and package storage. Implement chargeback or showback flows for
      each consuming team.
domains:
  - name: Understand Usage and Cost
    capabilities:
      - Data Ingestion
      - Allocation
      - Reporting and Analytics
      - Anomaly Management
  - name: Quantify Business Value
    capabilities:
      - Planning and Estimating
      - Forecasting
      - Budgeting
      - Benchmarking
      - Unit Economics
  - name: Optimize Usage and Cost
    capabilities:
      - Architecting for Cloud
      - Rate Optimization
      - Workload Optimization
      - Cloud Sustainability
      - Licensing and SaaS
  - name: Manage the FinOps Practice
    capabilities:
      - FinOps Practice Operations
      - FinOps Education and Enablement
      - Invoicing and Chargeback
      - Onboarding Workloads
      - Intersecting Disciplines
billingModel:
  pricingCategory: Subscription + Usage-Based Add-Ons
  billingFrequency: Monthly (annual commitment for Enterprise)
  billingCurrency: USD
  chargeCategories:
    - Usage
    - Purchase
    - Tax
    - Credit
    - Adjustment
  chargeFrequency: Recurring
focusColumns:
  ServiceName: Gitea
  ServiceCategory: Developer Tools / DevOps
  ProviderName: Gitea
  PublisherName: CommitGo, Inc.
  InvoiceIssuerName: CommitGo, Inc.
  PricingCategory: Subscription
  PricingUnit: user-month
  BillingCurrency: USD
  ChargeCategory: Usage
meters:
  - name: enterprise_seats
    description: Active Gitea Enterprise per-user license seats
    unit: user-month
    aggregation: max
    dimensions:
      - instance
      - team
      - cost_center
  - name: cloud_subscription
    description: Recurring Gitea Cloud instance subscription
    unit: instance-month
    aggregation: max
    dimensions:
      - instance
      - region
      - tier
      - team
      - cost_center
  - name: object_storage
    description: Object Storage add-on capacity used for LFS and packages
    unit: GB-month
    aggregation: max
    dimensions:
      - instance
      - region
      - tier
  - name: outbound_traffic
    description: Outbound network traffic from a Gitea Cloud instance
    unit: GB
    aggregation: sum
    dimensions:
      - instance
      - region
  - name: actions_minutes
    description: Compute minutes consumed by Gitea Actions runner jobs
    unit: minute
    aggregation: sum
    dimensions:
      - instance
      - repository
      - workflow
      - runner_label
  - name: api_requests
    description: REST API request volume (operator-visible signal; not directly billed)
    unit: request
    aggregation: sum
    dimensions:
      - api
      - endpoint
      - tier
      - consumer
apis:
  - name: Gitea REST API
    baseURL: https://gitea.com/api/v1
    tags:
      - REST
      - Git
      - Code Hosting
    serviceName: Gitea REST API
    serviceCategory: API
  - name: Gitea Actions API
    baseURL: https://gitea.com/api/v1
    tags:
      - CI/CD
      - Workflows
    serviceName: Gitea Actions API
    serviceCategory: API
  - name: Gitea Package Registry
    baseURL: https://gitea.com/api/packages
    tags:
      - Packages
      - Registry
    serviceName: Gitea Package Registry
    serviceCategory: API
  - name: Gitea Webhooks
    baseURL: ''
    tags:
      - Webhooks
      - Events
    serviceName: Gitea Webhooks
    serviceCategory: API
  - name: Gitea Cloud Management API
    baseURL: https://cloud.gitea.com
    tags:
      - Cloud
      - Management
    serviceName: Gitea Cloud Management API
    serviceCategory: API
unitEconomics:
  - name: Cost Per Active Developer
    metric: billed_cost / active_users
    target: TBD
  - name: Cost Per 1K API Requests
    metric: billed_cost / (api_requests / 1000)
    target: TBD
  - name: Cost Per Actions Minute
    metric: billed_cost / actions_minutes
    target: TBD
  - name: Cost Per GB Stored
    metric: billed_cost / object_storage_gb
    target: TBD
maintainers:
