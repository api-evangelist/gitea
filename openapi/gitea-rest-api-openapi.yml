servers:
- url: https://gitea.com/api/v1
- url: http://gitea.com/api/v1
paths:
  /admin/actions/jobs:
    get:
      tags:
      - admin
      summary: Lists All Jobs
      operationId: listAdminWorkflowJobs
      parameters:
      - name: status
        in: query
        description: workflow status (pending, queued, in_progress, failure, success, skipped)
        schema:
          type: string
      - name: page
        in: query
        description: page number of results to return (1-based)
        schema:
          type: integer
      - name: limit
        in: query
        description: page size of results
        schema:
          type: integer
      responses:
        '200':
          description: ''
        '400':
          description: ''
        '404':
          description: ''
  /admin/actions/runners:
    get:
      tags:
      - admin
      summary: Get All Runners
      operationId: getAdminRunners
      parameters:
      - name: disabled
        in: query
        description: filter by disabled status (true or false)
        schema:
          type: boolean
      responses:
        '200':
          description: ''
        '400':
          description: ''
        '404':
          description: ''
  /admin/actions/runners/registration-token:
    post:
      tags:
      - admin
      summary: Get a Global Actions Runner Registration Token
      operationId: adminCreateRunnerRegistrationToken
      responses:
        '200':
          description: ''
  /admin/actions/runners/{runner_id}:
    get:
      tags:
      - admin
      summary: Get a Global Runner
      operationId: getAdminRunner
      parameters:
      - name: runner_id
        in: path
        description: id of the runner
        required: true
        schema:
          type: string
      responses:
        '200':
          description: ''
        '400':
          description: ''
        '404':
          description: ''
    delete:
      tags:
      - admin
      summary: Delete a Global Runner
      operationId: deleteAdminRunner
      parameters:
      - name: runner_id
        in: path
        description: id of the runner
        required: true
        schema:
          type: string
      responses:
        '204':
          description: runner has been deleted
        '400':
          description: ''
        '404':
          description: ''
    patch:
      tags:
      - admin
      summary: Update a Global Runner
      operationId: updateAdminRunner
      parameters:
      - name: runner_id
        in: path
        description: id of the runner
        required: true
        schema:
          type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EditActionRunnerOption'
      responses:
        '200':
          description: ''
        '400':
          description: ''
        '404':
          description: ''
        '422':
          description: ''
  /admin/actions/runs:
    get:
      tags:
      - admin
      summary: Lists All Runs
      operationId: listAdminWorkflowRuns
      parameters:
      - name: event
        in: query
        description: workflow event name
        schema:
          type: string
      - name: branch
        in: query
        description: workflow branch
        schema:
          type: string
      - name: status
        in: query
        description: workflow status (pending, queued, in_progress, failure, success, skipped)
        schema:
          type: string
      - name: actor
        in: query
        description: triggered by user
        schema:
          type: string
      - name: head_sha
        in: query
        description: triggering sha of the workflow run
        schema:
          type: string
      - name: page
        in: query
        description: page number of results to return (1-based)
        schema:
          type: integer
      - name: limit
        in: query
        description: page size of results
        schema:
          type: integer
      responses:
        '200':
          description: ''
        '400':
          description: ''
        '404':
          description: ''
  /admin/cron:
    get:
      tags:
      - admin
      summary: List Cron Tasks
      operationId: adminCronList
      parameters:
      - name: page
        in: query
        description: page number of results to return (1-based)
        schema:
          type: integer
      - name: limit
        in: query
        description: page size of results
        schema:
          type: integer
      responses:
        '200':
          description: ''
        '403':
          description: ''
  /admin/cron/{task}:
    post:
      tags:
      - admin
      summary: Run Cron Task
      operationId: adminCronRun
      parameters:
      - name: task
        in: path
        description: task to run
        required: true
        schema:
          type: string
      responses:
        '204':
          description: ''
        '404':
          description: ''
  /admin/emails:
    get:
      tags:
      - admin
      summary: List All Emails
      operationId: adminGetAllEmails
      parameters:
      - name: page
        in: query
        description: page number of results to return (1-based)
        schema:
          type: integer
      - name: limit
        in: query
        description: page size of results
        schema:
          type: integer
      responses:
        '200':
          description: ''
        '403':
          description: ''
  /admin/emails/search:
    get:
      tags:
      - admin
      summary: Search All Emails
      operationId: adminSearchEmails
      parameters:
      - name: q
        in: query
        description: keyword
        schema:
          type: string
      - name: page
        in: query
        description: page number of results to return (1-based)
        schema:
          type: integer
      - name: limit
        in: query
        description: page size of results
        schema:
          type: integer
      responses:
        '200':
          description: ''
        '403':
          description: ''
  /admin/hooks:
    get:
      tags:
      - admin
      summary: List System's Webhooks
      operationId: adminListHooks
      parameters:
      - name: page
        in: query
        description: page number of results to return (1-based)
        schema:
          type: integer
      - name: limit
        in: query
        description: page size of results
        schema:
          type: integer
      - name: type
        in: query
        description: system, default or both kinds of webhooks
        schema:
          enum:
          - system
          - default
          - all
          type: string
          default: system
      responses:
        '200':
          description: ''
    post:
      tags:
      - admin
      summary: Create a Hook
      operationId: adminCreateHook
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateHookOption'
      responses:
        '201':
          description: ''
  /admin/hooks/{id}:
    get:
      tags:
      - admin
      summary: Get a Hook
      operationId: adminGetHook
      parameters:
      - name: id
        in: path
        description: id of the hook to get
        required: true
        schema:
          type: integer
          format: int64
      responses:
        '200':
          description: ''
    delete:
      tags:
      - admin
      summary: Delete a Hook
      operationId: adminDeleteHook
      parameters:
      - name: id
        in: path
        description: id of the hook to delete
        required: true
        schema:
          type: integer
          format: int64
      responses:
        '204':
          description: ''
    patch:
      tags:
      - admin
      summary: Update a Hook
      operationId: adminEditHook
      parameters:
      - name: id
        in: path
        description: id of the hook to update
        required: true
        schema:
          type: integer
          format: int64
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EditHookOption'
      responses:
        '200':
          description: ''
  /admin/orgs:
    get:
      tags:
      - admin
      summary: List All Organizations
      operationId: adminGetAllOrgs
      parameters:
      - name: page
        in: query
        description: page number of results to return (1-based)
        schema:
          type: integer
      - name: limit
        in: query
        description: page size of results
        schema:
          type: integer
      responses:
        '200':
          description: ''
        '403':
          description: ''
  /admin/unadopted:
    get:
      tags:
      - admin
      summary: List Unadopted Repositories
      operationId: adminUnadoptedList
      parameters:
      - name: page
        in: query
        description: page number of results to return (1-based)
        schema:
          type: integer
      - name: limit
        in: query
        description: page size of results
        schema:
          type: integer
      - name: pattern
        in: query
        description: pattern of repositories to search for
        schema:
          type: string
      responses:
        '200':
          description: ''
        '403':
          description: ''
  /admin/unadopted/{owner}/{repo}:
    post:
      tags:
      - admin
      summary: Adopt Unadopted Files as a Repository
      operationId: adminAdoptRepository
      parameters:
      - name: owner
        in: path
        description: owner of the repo
        required: true
        schema:
          type: string
      - name: repo
        in: path
        description: name of the repo
        required: true
        schema:
          type: string
      responses:
        '204':
          description: ''
        '403':
          description: ''
        '404':
          description: ''
    delete:
      tags:
      - admin
      summary: Delete Unadopted Files
      operationId: adminDeleteUnadoptedRepository
      parameters:
      - name: owner
        in: path
        description: owner of the repo
        required: true
        schema:
          type: string
      - name: repo
        in: path
        description: name of the repo
        required: true
        schema:
          type: string
      responses:
        '204':
          description: ''
        '403':
          description: ''
  /admin/users:
    get:
      tags:
      - admin
      summary: Search Users According Filter Conditions
      operationId: adminSearchUsers
      parameters:
      - name: source_id
        in: query
        description: ID of the user's login source to search for
        schema:
          type: integer
          format: int64
      - name: login_name
        in: query
        description: identifier of the user, provided by the external authenticator
        schema:
          type: string
      - name: page
        in: query
        description: page number of results to return (1-based)
        schema:
          type: integer
      - name: limit
        in: query
        description: page size of results
        schema:
          type: integer
      - name: sort
        in: query
        description: sort users by attribute. Supported values are "name", "created", "updated" and "id". Default is "name"
        schema:
          type: string
      - name: order
        in: query
        description: sort order, either "asc" (ascending) or "desc" (descending). Default is "asc", ignored if "sort" is not
          specified.
        schema:
          type: string
      - name: q
        in: query
        description: search term (username, full name, email)
        schema:
          type: string
      - name: visibility
        in: query
        description: visibility filter. Supported values are "public", "limited" and "private".
        schema:
          type: string
      - name: is_active
        in: query
        description: filter active users
        schema:
          type: boolean
      - name: is_admin
        in: query
        description: filter admin users
        schema:
          type: boolean
      - name: is_restricted
        in: query
        description: filter restricted users
        schema:
          type: boolean
      - name: is_2fa_enabled
        in: query
        description: filter 2FA enabled users
        schema:
          type: boolean
      - name: is_prohibit_login
        in: query
        description: filter login prohibited users
        schema:
          type: boolean
      responses:
        '200':
          description: ''
        '403':
          description: ''
        '422':
          description: ''
    post:
      tags:
      - admin
      summary: Create a User
      operationId: adminCreateUser
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserOption'
      responses:
        '201':
          description: ''
        '400':
          description: ''
        '403':
          description: ''
        '422':
          description: ''
  /admin/users/{username}:
    delete:
      tags:
      - admin
      summary: Delete a User
      operationId: adminDeleteUser
      parameters:
      - name: username
        in: path
        description: username of the user to delete
        required: true
        schema:
          type: string
      - name: purge
        in: query
        description: purge the user from the system completely
        schema:
          type: boolean
      responses:
        '204':
          description: ''
        '403':
          description: ''
        '404':
          description: ''
        '422':
          description: ''
    patch:
      tags:
      - admin
      summary: Edit an Existing User
      operationId: adminEditUser
      parameters:
      - name: username
        in: path
        description: username of the user whose data is to be edited
        required: true
        schema:
          type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EditUserOption'
      responses:
        '200':
          description: ''
        '400':
          description: ''
        '403':
          description: ''
        '422':
          description: ''
  /admin/users/{username}/badges:
    get:
      tags:
      - admin
      summary: List a User's Badges
      operationId: adminListUserBadges
      parameters:
      - name: username
        in: path
        description: username of the user whose badges are to be listed
        required: true
        schema:
          type: string
      responses:
        '200':
          description: ''
        '404':
          description: ''
    post:
      tags:
      - admin
      summary: Add a Badge to a User
      operationId: adminAddUserBadges
      parameters:
      - name: username
        in: path
        description: username of the user to whom a badge is to be added
        required: true
        schema:
          type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserBadgeOption'
      responses:
        '204':
          description: ''
        '403':
          description: ''
    delete:
      tags:
      - admin
      summary: Remove a Badge from a User
      operationId: adminDeleteUserBadges
      parameters:
      - name: username
        in: path
        description: username of the user whose badge is to be deleted
        required: true
        schema:
          type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserBadgeOption'
      responses:
        '204':
          description: ''
        '403':
          description: ''
        '422':
          description: ''
  /admin/users/{username}/keys:
    post:
      tags:
      - admin
      summary: Add a Public Key on Behalf of a User
      operationId: adminCreatePublicKey
      parameters:
      - name: username
        in: path
        description: username of the user who is to receive a public key
        required: true
        schema:
          type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateKeyOption'
      responses:
        '201':
          description: ''
        '403':
          description: ''
        '422':
          description: ''
  /admin/users/{username}/keys/{id}:
    delete:
      tags:
      - admin
      summary: Delete a User's Public Key
      operationId: adminDeleteUserPublicKey
      parameters:
      - name: username
        in: path
        description: username of the user whose public key is to be deleted
        required: true
        schema:
          type: string
      - name: id
        in: path
        description: id of the key to delete
        required: true
        schema:
          type: integer
          format: int64
      responses:
        '204':
          description: ''
        '403':
          description: ''
        '404':
          description: ''
  /admin/users/{username}/orgs:
    post:
      tags:
      - admin
      summary: Create an Organization
      operationId: adminCreateOrg
      parameters:
      - name: username
        in: path
        description: username of the user who will own the created organization
        required: true
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrgOption'
      responses:
        '201':
          description: ''
        '403':
          description: ''
        '422':
          description: ''
  /admin/users/{username}/rename:
    post:
      tags:
      - admin
      summary: Rename a User
      operationId: adminRenameUser
      parameters:
      - name: username
        in: path
        description: current username of the user
        required: true
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RenameUserOption'
      responses:
        '204':
          description: ''
        '403':
          description: ''
        '422':
          description: ''
  /admin/users/{username}/repos:
    post:
      tags:
      - admin
      summary: Create a Repository on Behalf of a User
      operationId: adminCreateRepo
      parameters:
      - name: username
        in: path
        description: username of the user who will own the created repository
        required: true
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRepoOption'
      responses:
        '201':
          description: ''
        '400':
          description: ''
        '403':
          description: ''
        '404':
          description: ''
        '409':
          description: ''
        '422':
          description: ''
  /gitignore/templates:
    get:
      tags:
      - miscellaneous
      summary: Returns a List of All Gitignore Templates
      operationId: listGitignoresTemplates
      responses:
        '200':
          description: ''
  /gitignore/templates/{name}:
    get:
      tags:
      - miscellaneous
      summary: Returns Information About a Gitignore Template
      operationId: getGitignoreTemplateInfo
      parameters:
      - name: name
        in: path
        description: name of the template
        required: true
        schema:
          type: string
      responses:
        '200':
          description: ''
        '404':
          description: ''
  /label/templates:
    get:
      tags:
      - miscellaneous
      summary: Returns a List of All Label Templates
      operationId: listLabelTemplates
      responses:
        '200':
          description: ''
  /label/templates/{name}:
    get:
      tags:
      - miscellaneous
      summary: Returns All Labels in a Template
      operationId: getLabelTemplateInfo
      parameters:
      - name: name
        in: path
        description: name of the template
        required: true
        schema:
          type: string
      responses:
        '200':
          description: ''
        '404':
          description: ''
  /licenses:
    get:
      tags:
      - miscellaneous
      summary: Returns a List of All License Templates
      operationId: listLicenseTemplates
      responses:
        '200':
          description: ''
  /licenses/{name}:
    get:
      tags:
      - miscellaneous
      summary: Returns Information About a License Template
      operationId: getLicenseTemplateInfo
      parameters:
      - name: name
        in: path
        description: name of the license
        required: true
        schema:
          type: string
      responses:
        '200':
          description: ''
        '404':
          description: ''
  /markdown:
    post:
      tags:
      - miscellaneous
      summary: Render a Markdown Document as HTML
      operationId: renderMarkdown
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MarkdownOption'
      responses:
        '200':
          description: ''
        '422':
          description: ''
  /markdown/raw:
    post:
      tags:
      - miscellaneous
      summary: Render Raw Markdown as HTML
      operationId: renderMarkdownRaw
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: string
        description: Request body to render
      responses:
        '200':
          description: ''
        '422':
          description: ''
  /markup:
    post:
      tags:
      - miscellaneous
      summary: Render a Markup Document as HTML
      operationId: renderMarkup
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MarkupOption'
      responses:
        '200':
          description: ''
        '422':
          description: ''
  /notifications:
    get:
      tags:
      - notification
      summary: List Users's Notification Threads
      operationId: notifyGetList
      parameters:
      - name: all
        in: query
        description: If true, show notifications marked as read. Default value is false
        schema:
          type: boolean
      - name: status-types
        in: query
        description: 'Show notifications with the provided status types. Options are: unread, read and/or pinned. Defaults
          to unread & pinned.'
        schema:
          type: array
          items:
            type: string
      - name: subject-type
        in: query
        description: filter notifications by subject type
        schema:
          type: array
          items:
            enum:
            - issue
            - pull
            - commit
            - repository
            type: string
      - name: since
        in: query
        description: Only show notifications updated after the given time. This is a timestamp in RFC 3339 format
        schema:
          type: string
          format: date-time
      - name: before
        in: query
        description: Only show notifications updated before the given time. This is a timestamp in RFC 3339 format
        schema:
          type: string
          format: date-time
      - name: page
        in: query
        description: page number of results to return (1-based)
        schema:
          type: integer
      - name: limit
        in: query
        description: page size of results
        schema:
          type: integer
      responses:
        '200':
          description: ''
    put:
      tags:
      - notification
      summary: Mark Notification Threads as Read, Pinned or Unread
      operationId: notifyReadList
      parameters:
      - name: last_read_at
        in: query
        description: Describes the last point that notifications were checked. Anything updated since this time will not be
          updated.
        schema:
          type: string
          format: date-time
      - name: all
        in: query
        description: If true, mark all notifications on this repo. Default value is false
        schema:
          type: string
      - name: status-types
        in: query
        description: 'Mark notifications with the provided status types. Options are: unread, read and/or pinned. Defaults
          to unread.'
        schema:
          type: array
          items:
            type: string
      - name: to-status
        in: query
        description: Status to mark notifications as, Defaults to read.
        schema:
          type: string
      responses:
        '205':
          description: ''
  /notifications/new:
    get:
      tags:
      - notification
      summary: Check if Unread Notifications Exist
      operationId: notifyNewAvailable
      responses:
        '200':
          description: ''
  /notifications/threads/{id}:
    get:
      tags:
      - notification
      summary: Get Notification Thread by ID
      operationId: notifyGetThread
      parameters:
      - name: id
        in: path
        description: id of notification thread
        required: true
        schema:
          type: string
      responses:
        '200':
          description: ''
        '403':
          description: ''
        '404':
          description: ''
    patch:
      tags:
      - notification
      summary: Mark Notification Thread as Read by ID
      operationId: notifyReadThread
      parameters:
      - name: id
        in: path
        description: id of notification thread
        required: true
        schema:
          type: string
      - name: to-status
        in: query
        description: Status to mark notifications as
        schema:
          type: string
          default: read
      responses:
        '205':
          description: ''
        '403':
          description: ''
        '404':
          description: ''
  /org/{org}/repos:
    post:
      tags:
      - organization
      summary: Create a Repository in an Organization
      operationId: createOrgRepoDeprecated
      parameters:
      - name: org
        in: path
        description: name of organization
        required: true
        schema:
          type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRepoOption'
      responses:
        '201':
          description: ''
        '403':
          description: ''
        '404':
          description: ''
        '422':
          description: ''
  /orgs:
    get:
      tags:
      - organization
      summary: Get List of Organizations
      operationId: orgGetAll
      parameters:
      - name: page
        in: query
        description: page number of results to return (1-based)
        schema:
          type: integer
