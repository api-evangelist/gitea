      operationId: repoSearch
      parameters:
      - name: q
        in: query
        description: keyword
        schema:
          type: string
      - name: topic
        in: query
        description: Limit search to repositories with keyword as topic
        schema:
          type: boolean
      - name: includeDesc
        in: query
        description: include search of keyword within repository description
        schema:
          type: boolean
      - name: uid
        in: query
        description: search only for repos that the user with the given id owns or contributes to
        schema:
          type: integer
          format: int64
      - name: priority_owner_id
        in: query
        description: repo owner to prioritize in the results
        schema:
          type: integer
          format: int64
      - name: team_id
        in: query
        description: search only for repos that belong to the given team id
        schema:
          type: integer
          format: int64
      - name: starredBy
        in: query
        description: search only for repos that the user with the given id has starred
        schema:
          type: integer
          format: int64
      - name: private
        in: query
        description: include private repositories this user has access to (defaults to true)
        schema:
          type: boolean
      - name: is_private
        in: query
        description: show only pubic, private or all repositories (defaults to all)
        schema:
          type: boolean
      - name: template
        in: query
        description: include template repositories this user has access to (defaults to true)
        schema:
          type: boolean
      - name: archived
        in: query
        description: show only archived, non-archived or all repositories (defaults to all)
        schema:
          type: boolean
      - name: mode
        in: query
        description: type of repository to search for. Supported values are "fork", "source", "mirror" and "collaborative"
        schema:
          type: string
      - name: exclusive
        in: query
        description: if `uid` is given, search only for repos that the user owns
        schema:
          type: boolean
      - name: sort
        in: query
        description: sort repos by attribute. Supported values are "alpha", "created", "updated", "size", "git_size", "lfs_size",
          "stars", "forks" and "id". Default is "alpha"
        schema:
          type: string
      - name: order
        in: query
        description: sort order, either "asc" (ascending) or "desc" (descending). Default is "asc", ignored if "sort" is not
          specified.
        schema:
          type: string
      - name: page
        in: query
        description: page number of results to return (1-based)
        schema:
          type: integer
      - name: limit
        in: query
        description: page size of results
        schema:
          type: integer
      responses:
