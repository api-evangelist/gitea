        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: variablename
          in: path
          type: string
          description: name of the variable
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
      - name: createuservariable
        method: POST
        description: Create a User-Level Variable
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: variablename
          in: path
          type: string
          description: name of the variable
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
      - name: deleteuservariable
        method: DELETE
        description: Delete a User-Level Variable Which Is Created by Current Doer
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: variablename
          in: path
          type: string
          description: name of the variable
          required: true
