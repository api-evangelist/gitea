naftiko: 1.0.0-alpha2
info:
  label: Gitea API — user
  description: 'Gitea API — user. 76 operations. Lead operation: Get the Authenticated User. Self-contained Naftiko capability
    covering one Gitea business surface.'
  tags:
  - Gitea
  - user
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITEA_API_KEY: GITEA_API_KEY
capability:
  consumes:
  - type: http
    namespace: rest-user
    baseUri: https://gitea.com/api/v1
    description: Gitea API — user business capability. Self-contained, no shared references.
    resources:
    - name: user
      path: /user
      operations:
      - name: usergetcurrent
        method: GET
        description: Get the Authenticated User
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: user-actions-jobs
      path: /user/actions/jobs
      operations:
      - name: getuserworkflowjobs
        method: GET
        description: Get Workflow Jobs
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: status
          in: query
          type: string
          description: workflow status (pending, queued, in_progress, failure, success, skipped)
        - name: page
          in: query
          type: integer
          description: page number of results to return (1-based)
        - name: limit
          in: query
          type: integer
          description: page size of results
    - name: user-actions-runners
      path: /user/actions/runners
      operations:
      - name: getuserrunners
        method: GET
        description: Get User-Level Runners
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: disabled
          in: query
          type: boolean
          description: filter by disabled status (true or false)
    - name: user-actions-runners-registration-token
      path: /user/actions/runners/registration-token
      operations:
      - name: usercreaterunnerregistrationtoken
        method: POST
        description: Get a User's Actions Runner Registration Token
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: user-actions-runners-runner_id
      path: /user/actions/runners/{runner_id}
      operations:
      - name: getuserrunner
        method: GET
        description: Get a User-Level Runner
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: runner_id
          in: path
          type: string
          description: id of the runner
          required: true
      - name: deleteuserrunner
        method: DELETE
        description: Delete a User-Level Runner
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: runner_id
          in: path
          type: string
          description: id of the runner
          required: true
      - name: updateuserrunner
        method: PATCH
        description: Update a User-Level Runner
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: runner_id
          in: path
          type: string
          description: id of the runner
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: user-actions-runs
      path: /user/actions/runs
      operations:
      - name: getuserworkflowruns
        method: GET
        description: Get Workflow Runs
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: event
          in: query
          type: string
          description: workflow event name
        - name: branch
          in: query
          type: string
          description: workflow branch
        - name: status
          in: query
          type: string
          description: workflow status (pending, queued, in_progress, failure, success, skipped)
        - name: actor
          in: query
          type: string
          description: triggered by user
        - name: head_sha
          in: query
          type: string
          description: triggering sha of the workflow run
        - name: page
          in: query
          type: integer
          description: page number of results to return (1-based)
        - name: limit
          in: query
          type: integer
          description: page size of results
    - name: user-actions-secrets-secretname
      path: /user/actions/secrets/{secretname}
      operations:
      - name: updateusersecret
        method: PUT
        description: Create or Update a Secret Value in a User Scope
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: secretname
          in: path
          type: string
          description: name of the secret
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
      - name: deleteusersecret
        method: DELETE
        description: Delete a Secret in a User Scope
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: secretname
          in: path
          type: string
          description: name of the secret
          required: true
