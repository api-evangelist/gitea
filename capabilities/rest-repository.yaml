        q: tools.q
        topic: tools.topic
        includeDesc: tools.includeDesc
        uid: tools.uid
        priority_owner_id: tools.priority_owner_id
        team_id: tools.team_id
        starredBy: tools.starredBy
        private: tools.private
        is_private: tools.is_private
        template: tools.template
        archived: tools.archived
        mode: tools.mode
        exclusive: tools.exclusive
        sort: tools.sort
        order: tools.order
        page: tools.page
        limit: tools.limit
      outputParameters:
      - type: object
        mapping: $.
