naftiko: 1.0.0-alpha2
info:
  label: Gitea API — repository
  description: 'Gitea API — repository. 197 operations. Lead operation: Migrate a Remote Git Repository. Self-contained Naftiko
    capability covering one Gitea business surface.'
  tags:
  - Gitea
  - repository
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITEA_API_KEY: GITEA_API_KEY
capability:
  consumes:
  - type: http
    namespace: rest-repository
    baseUri: https://gitea.com/api/v1
    description: Gitea API — repository business capability. Self-contained, no shared references.
    resources:
    - name: repos-migrate
      path: /repos/migrate
      operations:
      - name: repomigrate
        method: POST
        description: Migrate a Remote Git Repository
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: repos-search
      path: /repos/search
      operations:
      - name: reposearch
        method: GET
        description: Search for Repositories
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: q
          in: query
          type: string
          description: keyword
        - name: topic
          in: query
          type: boolean
          description: Limit search to repositories with keyword as topic
        - name: includeDesc
          in: query
          type: boolean
          description: include search of keyword within repository description
        - name: uid
          in: query
          type: integer
          description: search only for repos that the user with the given id owns or contributes to
        - name: priority_owner_id
          in: query
          type: integer
          description: repo owner to prioritize in the results
        - name: team_id
          in: query
          type: integer
          description: search only for repos that belong to the given team id
        - name: starredBy
          in: query
          type: integer
          description: search only for repos that the user with the given id has starred
        - name: private
          in: query
          type: boolean
          description: include private repositories this user has access to (defaults to true)
        - name: is_private
          in: query
          type: boolean
          description: show only pubic, private or all repositories (defaults to all)
        - name: template
          in: query
          type: boolean
          description: include template repositories this user has access to (defaults to true)
        - name: archived
          in: query
          type: boolean
          description: show only archived, non-archived or all repositories (defaults to all)
        - name: mode
          in: query
          type: string
          description: type of repository to search for. Supported values are "fork", "source", "mirror" and "collaborative"
        - name: exclusive
          in: query
          type: boolean
          description: if `uid` is given, search only for repos that the user owns
        - name: sort
          in: query
          type: string
          description: sort repos by attribute. Supported values are "alpha", "created", "updated", "size", "git_size", "lfs_size",
            "stars", "forks" and "id". Default is "alpha"
        - name: order
          in: query
          type: string
          description: sort order, either "asc" (ascending) or "desc" (descending). Default is "asc", ignored if "sort" is
            not specified.
        - name: page
          in: query
          type: integer
          description: page number of results to return (1-based)
        - name: limit
          in: query
          type: integer
          description: page size of results
    - name: repos-owner-repo
      path: /repos/{owner}/{repo}
      operations:
      - name: repoget
        method: GET
        description: Get a Repository
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: owner
