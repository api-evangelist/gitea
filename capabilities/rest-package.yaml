    resources:
    - path: /v1/packages/{owner}
      name: packages-owner
      description: REST surface for packages-owner.
      operations:
      - method: GET
        name: listpackages
        description: Gets All Packages of an Owner
        call: rest-package.listpackages
        with:
          owner: rest.owner
          page: rest.page
          limit: rest.limit
          type: rest.type
          q: rest.q
        outputParameters:
        - type: object
