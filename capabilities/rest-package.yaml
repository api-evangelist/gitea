naftiko: 1.0.0-alpha2
info:
  label: Gitea API — package
  description: 'Gitea API — package. 9 operations. Lead operation: Gets All Packages of an Owner. Self-contained Naftiko capability
    covering one Gitea business surface.'
  tags:
  - Gitea
  - package
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GITEA_API_KEY: GITEA_API_KEY
capability:
  consumes:
  - type: http
    namespace: rest-package
    baseUri: https://gitea.com/api/v1
    description: Gitea API — package business capability. Self-contained, no shared references.
    resources:
    - name: packages-owner
      path: /packages/{owner}
      operations:
      - name: listpackages
        method: GET
        description: Gets All Packages of an Owner
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: owner
          in: path
          type: string
          description: owner of the packages
          required: true
        - name: page
          in: query
          type: integer
          description: page number of results to return (1-based)
        - name: limit
          in: query
          type: integer
          description: page size of results
        - name: type
          in: query
          type: string
          description: package type filter
        - name: q
          in: query
          type: string
          description: name filter
    - name: packages-owner-type-name
      path: /packages/{owner}/{type}/{name}
      operations:
      - name: listpackageversions
        method: GET
        description: Gets All Versions of a Package
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: owner
          in: path
          type: string
          description: owner of the package
          required: true
        - name: type
          in: path
          type: string
          description: type of the package
          required: true
        - name: name
          in: path
          type: string
          description: name of the package
          required: true
        - name: page
          in: query
          type: integer
          description: page number of results to return (1-based)
        - name: limit
          in: query
          type: integer
          description: page size of results
      - name: deletepackage
        method: DELETE
        description: Delete a Package
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: owner
          in: path
          type: string
          description: owner of the package
          required: true
        - name: type
          in: path
          type: string
          description: type of the package
          required: true
        - name: name
          in: path
          type: string
          description: name of the package
          required: true
    - name: packages-owner-type-name---latest
      path: /packages/{owner}/{type}/{name}/-/latest
      operations:
      - name: getlatestpackageversion
        method: GET
        description: Gets the Latest Version of a Package
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: owner
          in: path
          type: string
          description: owner of the package
          required: true
        - name: type
          in: path
          type: string
          description: type of the package
          required: true
        - name: name
          in: path
          type: string
          description: name of the package
          required: true
    - name: packages-owner-type-name---link-repo_name
      path: /packages/{owner}/{type}/{name}/-/link/{repo_name}
      operations:
      - name: linkpackage
        method: POST
        description: Link a Package to a Repository
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: owner
          in: path
          type: string
          description: owner of the package
          required: true
        - name: type
          in: path
          type: string
          description: type of the package
          required: true
        - name: name
          in: path
          type: string
          description: name of the package
          required: true
        - name: repo_name
          in: path
          type: string
          description: name of the repository to link.
          required: true
    - name: packages-owner-type-name---unlink
      path: /packages/{owner}/{type}/{name}/-/unlink
      operations:
      - name: unlinkpackage
        method: POST
        description: Unlink a Package from a Repository
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: owner
          in: path
          type: string
          description: owner of the package
          required: true
        - name: type
          in: path
          type: string
          description: type of the package
          required: true
        - name: name
          in: path
          type: string
          description: name of the package
          required: true
    - name: packages-owner-type-name-version
      path: /packages/{owner}/{type}/{name}/{version}
      operations:
      - name: getpackage
        method: GET
        description: Gets a Package
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: owner
          in: path
          type: string
          description: owner of the package
          required: true
        - name: type
          in: path
          type: string
          description: type of the package
          required: true
        - name: name
          in: path
          type: string
          description: name of the package
          required: true
        - name: version
          in: path
          type: string
          description: version of the package
          required: true
      - name: deletepackageversion
        method: DELETE
        description: Delete a Package Version
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: owner
          in: path
          type: string
          description: owner of the package
          required: true
        - name: type
          in: path
          type: string
          description: type of the package
          required: true
        - name: name
          in: path
          type: string
          description: name of the package
          required: true
        - name: version
          in: path
          type: string
          description: version of the package
          required: true
    - name: packages-owner-type-name-version-files
      path: /packages/{owner}/{type}/{name}/{version}/files
      operations:
      - name: listpackagefiles
        method: GET
        description: Gets All Files of a Package
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: owner
          in: path
          type: string
          description: owner of the package
          required: true
        - name: type
          in: path
          type: string
          description: type of the package
          required: true
        - name: name
          in: path
          type: string
          description: name of the package
          required: true
        - name: version
          in: path
          type: string
          description: version of the package
          required: true
    authentication:
      type: apikey
      key: access_token
      value: '{{env.GITEA_API_KEY}}'
      placement: query
  exposes:
