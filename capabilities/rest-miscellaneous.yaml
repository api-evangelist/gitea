      - method: GET
        name: listlicensetemplates
        description: Returns a List of All License Templates
        call: rest-miscellaneous.listlicensetemplates
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/licenses/{name}
      name: licenses-name
