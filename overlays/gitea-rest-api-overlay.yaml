overlay: 1.0.0
info:
  title: API Evangelist enhancements for Gitea REST API
  version: 1.0.0
extends: openapi/gitea-rest-api-openapi-original.yml
actions:
  - target: $.info
    update:
      x-apievangelist-provider: gitea
      x-apievangelist-artifacts:
        authentication: authentication/gitea-authentication.yml
        scopes: scopes/gitea-scopes.yml
        conformance: conformance/gitea-conformance.yml
        errors: errors/gitea-problem-types.yml
        lifecycle: lifecycle/gitea-lifecycle.yml
        conventions: conventions/gitea-conventions.yml
        data_model: data-model/gitea-data-model.yml
        mcp: mcp/gitea-mcp.yml
        packages: packages/gitea-packages.yml
        cli: cli/gitea-cli.yml
        changelog: changelog/gitea-changelog.yml
        well_known: well-known/gitea-well-known.yml
        grpc: grpc/gitea-runner-v1-services.proto
      x-apievangelist-pagination:
        style: page-number
        params: [page, limit]
        response_headers: [Link, X-Total-Count]
      x-apievangelist-oidc-issuer: https://gitea.com
  - target: $.info
    update:
      x-apievangelist-note: >-
        Gitea is an OAuth2/OIDC provider (openid/profile/email/groups scopes) in
        addition to the apiKey/basic schemes declared in this Swagger 2.0 spec;
        personal access tokens use <read|write>:<category> permission scopes.
